<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Dono - Administra Fácil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex items-center justify-center p-4 sm:p-6 md:p-8 selection:bg-amber-500/30">

    <div class="bg-slate-900 border border-slate-800 rounded-3xl max-w-5xl w-full p-6 md:p-8 shadow-2xl relative my-auto animate-fade-in">
        
        <div class="flex flex-col items-center justify-center border-b border-slate-800/60 pb-6 mb-6 text-center relative">
            <h2 class="text-xl md:text-2xl font-black text-amber-400 flex items-center gap-2">
                <span>👑</span> Painel do Dono (Administração)
            </h2>
            <p class="text-xs text-slate-400 mt-1 max-w-sm leading-relaxed">
                Gerencie seu negócio de forma simples, visual e inclusiva.
            </p>
            
            <button onclick="window.location.href='index.html'" class="absolute -top-2 -right-2 bg-slate-800 hover:bg-rose-950/80 text-slate-400 hover:text-rose-300 w-10 h-10 rounded-full flex items-center justify-center text-lg transition-all border border-slate-700/50 shadow-lg cursor-pointer">
                ✕
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-emerald-950/30 border border-emerald-800/40 p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-inner">
                <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-wider">🟢 Dinheiro que Entrou</span>
                <span id="faturamento-real" class="text-2xl font-black text-emerald-200 block mt-1">R$ 0,00</span>
            </div>
            <div class="bg-rose-950/30 border border-rose-800/40 p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-inner">
                <span class="text-[10px] text-rose-400 font-bold uppercase tracking-wider">💸 Dinheiro que Saiu</span>
                <span id="despesas-real" class="text-2xl font-black text-rose-200 block mt-1">R$ 0,00</span>
            </div>
            <div class="bg-blue-950/30 border border-blue-800/40 p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-inner">
                <span class="text-[10px] text-blue-400 font-bold uppercase tracking-wider">🤝 Sobrou no Caixa</span>
                <span id="saldo-real" class="text-2xl font-black text-blue-200 block mt-1">R$ 0,00</span>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            
            <button onclick="alert('Tela: Adicionar ou Tirar produtos do cardápio')" class="group flex flex-col items-center justify-start p-5 bg-slate-800/40 border border-slate-700/50 rounded-2xl hover:bg-slate-800/80 hover:border-amber-500/50 transition-all text-center min-h-[190px] w-full shadow-md cursor-pointer">
                <div class="bg-slate-700/30 w-14 h-14 rounded-full flex items-center justify-center mb-3 group-hover:bg-amber-950/50 group-hover:scale-105 transition-all border border-slate-700/30">
                    <span class="text-2xl">🍔</span>
                </div>
                <span class="font-bold text-sm block text-slate-200 group-hover:text-amber-300 transition-colors">Mudar Cardápio</span>
                <span class="text-[11px] text-slate-400 mt-1.5 leading-snug group-hover:text-slate-300 transition-colors">
                    Coloque ou tire lanches e bebidas da venda rápida
                </span>
            </button>

            <button onclick="window.carregarEstoqueReal()" class="group flex flex-col items-center justify-start p-5 bg-slate-800/40 border border-slate-700/50 rounded-2xl hover:bg-slate-800/80 hover:border-amber-500/50 transition-all text-center min-h-[190px] w-full shadow-md cursor-pointer">
                <div class="bg-slate-700/30 w-14 h-14 rounded-full flex items-center justify-center mb-3 group-hover:bg-amber-950/50 group-hover:scale-105 transition-all border border-slate-700/30">
                    <span class="text-2xl">📦</span>
                </div>
                <span class="font-bold text-sm block text-slate-200 group-hover:text-amber-300 transition-colors">Estoque & Validade</span>
                <span class="text-[11px] text-slate-400 mt-1.5 leading-snug group-hover:text-slate-300 transition-colors">
                    Acompanhe o que está acabando ou vencendo logo
                </span>
            </button>

            <button onclick="abrirModalGasto()" class="group flex flex-col items-center justify-start p-5 bg-slate-800/40 border border-slate-700/50 rounded-2xl hover:bg-slate-800/80 hover:border-amber-500/50 transition-all text-center min-h-[190px] w-full shadow-md cursor-pointer">
    
    <div class="bg-slate-700/30 w-14 h-14 rounded-full flex items-center justify-center mb-3 group-hover:bg-amber-950/50 group-hover:scale-105 transition-all border border-slate-700/30">
        <span class="text-2xl">💰</span>
    </div>
    
    <span class="font-bold text-sm block text-slate-200 group-hover:text-amber-300 transition-colors">Anotar um Gasto</span>
    <span class="text-[11px] text-slate-400 mt-1.5 leading-snug group-hover:text-slate-300 transition-colors">
        Registre compras de mercadoria e contas pagas
    </span>
</button>

<button onclick="abrirModalAcessos()" class="group flex flex-col items-center justify-start p-5 bg-slate-800/40 border border-slate-700/50 rounded-2xl hover:bg-slate-800/80 hover:border-amber-500/50 transition-all text-center min-h-[190px] w-full shadow-md cursor-pointer">
    
    <div class="bg-slate-700/30 w-14 h-14 rounded-full flex items-center justify-center mb-3 group-hover:bg-amber-950/50 group-hover:scale-105 transition-all border border-slate-700/30">
        <span class="text-2xl">🔑</span>
    </div>
    
    <span class="font-bold text-sm block text-slate-200 group-hover:text-amber-300 transition-colors">Acessos da Equipe</span>
    <span class="text-[11px] text-slate-400 mt-1.5 leading-snug group-hover:text-slate-300 transition-colors">
        Controle quem da equipe pode mexer no caixa
    </span>
</button>
        </div>

        <div id="painel-dinamico-admin" class="bg-slate-950/40 border border-slate-800 p-5 rounded-2xl text-left hidden">
            </div>

    </div>
<div id="modal-gasto" class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
            
            <div class="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-950/50">
                <h3 class="text-lg font-semibold text-slate-200 flex items-center gap-2">
                    💸 Anotar um Gasto (Despesa)
                </h3>
                <button type="button" onclick="fecharModalGasto()" class="text-slate-400 hover:text-slate-200 transition-colors">
                    ✕
                </button>
            </div>

            <form id="form-gasto" onsubmit="salvarGasto(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Descrição do Gasto</label>
                    <input type="text" id="gasto-descricao" required placeholder="Ex: Compra de saco de lixo..." 
                           class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Valor (R$)</label>
                        <input type="text" id="gasto-valor" required placeholder="R$ 0,00" oninput="mascaraFechamentoMoeda(this)"
                               class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-slate-200 font-mono text-center focus:outline-none focus:border-blue-500 transition-colors">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Categoria</label>
                        <select id="gasto-categoria" required 
                                class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-slate-300 focus:outline-none focus:border-blue-500 transition-colors">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="Insumos/Perdas">Insumos / Perdas</option>
                            <option value="Manutenção">Manutenção Rápida</option>
                            <option value="Limpeza">Material de Limpeza</option>
                            <option value="Logística">Transporte / Frete</option>
                            <option value="Outros">Outros Fantasmas</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="fecharModalGasto()" 
                            class="w-1/2 py-2.5 bg-slate-800 hover:bg-slate-750 text-slate-300 font-medium rounded-xl transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" 
                            class="w-1/2 py-2.5 bg-red-600 hover:bg-red-500 text-white font-medium rounded-xl shadow-lg shadow-red-900/20 transition-colors">
                        Confirmar Gasto
                    </button>
                </div>
            </form>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js"></script>

    <script src="js/admin.js"></script>
</body>
</html>
